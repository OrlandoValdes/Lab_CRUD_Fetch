<!DOCTYPE html>
<html lang="es">

<head>
<!-- Configuración básica del documento -->
<meta charset="UTF-8">

<!-- Mejora la visualización en dispositivos móviles (responsive) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Título que aparece en la pestaña del navegador -->
<title>CRUD Productos</title>

<!-- Importación de Bootstrap para estilos -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<!-- Título principal del sistema -->
<h2>CRUD Productos</h2>

<!-- =========================
     FORMULARIO DE PRODUCTOS
========================= -->
<form id="frmProducto">

<!-- Campo oculto para almacenar el ID del producto (usado en edición) -->
<input type="hidden" id="id" name="id">

<!-- Campo: Código del producto -->
<div class="mb-3">
<label for="codigo" class="form-label">Código</label>
<input type="text" class="form-control" id="codigo" name="codigo">
</div>

<!-- Campo: Nombre del producto -->
<div class="mb-3">
<label for="producto" class="form-label">Producto</label>
<input type="text" class="form-control" id="producto" name="producto">
</div>

<!-- Campo: Descripción del producto -->
<div class="mb-3">
<label for="descripcion" class="form-label">Descripción</label>
<textarea class="form-control" id="descripcion" name="descripcion" rows="3"></textarea>
</div>

<!-- Campo: Precio del producto -->
<div class="mb-3">
<label for="precio" class="form-label">Precio</label>
<input type="number" step="0.01" class="form-control" id="precio" name="precio">
</div>

<!-- Campo: Cantidad del producto -->
<div class="mb-3">
<label for="cantidad" class="form-label">Cantidad</label>
<input type="number" min="1" class="form-control" id="cantidad" name="cantidad">
</div>

<!-- Botón de guardar o actualizar producto -->
<button type="button" class="btn btn-primary" id="btnGuardar">
Registrar
</button>

</form>

<hr>

<!-- =========================
     TABLA DE PRODUCTOS
========================= -->
<table class="table table-bordered">

<!-- Encabezados de la tabla -->
<thead>
<tr>
<th>ID</th>
<th>Código</th>
<th>Producto</th>
<th>Descripción</th>
<th>Precio</th>
<th>Cantidad</th>
<th>Acción</th>
</tr>
</thead>

<!-- Cuerpo dinámico de la tabla (se llena con JavaScript) -->
<tbody id="tblProductos"></tbody>

</table>

<!-- =========================
     BUSCADOR EN TIEMPO REAL
========================= -->
<div class="mb-3">
<input type="text"
       id="buscador"
       class="form-control"
       placeholder="Buscar producto..."
       onkeyup="buscarProductos()">
</div>

<!-- =========================
     PAGINACIÓN
========================= -->
<div class="mt-3 text-center">

<!-- Botón para ir a la página anterior -->
<button type="button" class="btn btn-secondary" onclick="paginaAnterior()">
Anterior
</button>

<!-- Indicador de página actual -->
<span id="numPagina">Página 1</span>

<!-- Botón para ir a la siguiente página -->
<button type="button" class="btn btn-secondary" onclick="paginaSiguiente()">
Siguiente
</button>

</div>

</div>

<!-- Librería SweetAlert para alertas bonitas -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Archivo principal de lógica JavaScript -->
<script src="script.js"></script>

</body>
</html>
